<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bin Youn — Trajectory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F4F0E8;
      --bg2: #ECE7DD;
      --fg: #1A1A18;
      --muted: #9A9690;
      --border: rgba(26,26,24,0.12);
      --header-h: 58px;
      --minimap-h: 82px;
      --pink: #FF2D9B;

      --c-education: #1A56DB;
      --c-artwork:   #C2620A;
      --c-exhibition:#8B3A0F;
      --c-research:  #1A6E3A;
      --c-career:    #6B21A8;
    }

    body {
      font-family: 'Space Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      overflow: hidden;
      height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ─────────────────────────────── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      z-index: 200;
    }

    .h-left { display: flex; flex-direction: column; gap: 2px; }

    .h-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .h-sub {
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .legend {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .l-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 1.5px solid transparent;
      cursor: pointer;
      padding: 3px 6px;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .l-item:hover { color: var(--fg); }
    .l-item.hidden-track { opacity: 0.28; }
    .l-item.hidden-track .l-dot { filter: grayscale(1); }

    .l-dot {
      width: 7px;
      height: 7px;
      flex-shrink: 0;
    }

    /* ─── NOW BUTTON ─────────────────────────── */
    .now-btn {
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--pink);
      color: var(--pink);
      cursor: pointer;
      padding: 4px 12px;
      transition: background 0.15s;
    }
    .now-btn:hover { background: rgba(255,45,155,0.07); }

    /* ─── TOOLTIP PIN ────────────────────────── */
    #tooltip.pinned { pointer-events: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.16); }
    .tt-close {
      position: absolute;
      top: 8px; right: 10px;
      font-size: 0.65rem;
      color: var(--muted);
      cursor: pointer;
      display: none;
      user-select: none;
    }
    #tooltip.pinned .tt-close { display: block; }

    /* ─── TIMELINE CONTAINER ─────────────────── */
    #tlContainer {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      bottom: var(--minimap-h);
      overflow: hidden;
      cursor: grab;
    }

    #tlContainer.dragging { cursor: grabbing; }

    #tlTrack {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      will-change: transform;
    }

    /* ─── PHASE BANDS ───────────────────────── */
    .phase-band {
      position: absolute;
      top: 0; bottom: 0;
    }

    .phase-label {
      position: absolute;
      font-size: 0.55rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      pointer-events: none;
    }

    /* ─── AXIS ──────────────────────────────── */
    .axis-line {
      position: absolute;
      left: 0;
      height: 1px;
      background: var(--fg);
      pointer-events: none;
    }

    /* ─── YEAR TICKS ────────────────────────── */
    .year-tick {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .tick-mark {
      background: var(--fg);
      width: 1px;
    }

    .tick-year {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.03em;
      color: var(--muted);
      margin-top: 5px;
      white-space: nowrap;
    }

    .year-tick.major .tick-year {
      font-weight: 600;
      color: var(--fg);
      font-size: 0.65rem;
    }

    /* ─── NOW MARKER ────────────────────────── */
    .now-line {
      position: absolute;
      width: 1px;
      background: var(--pink);
      pointer-events: none;
    }

    .now-tag {
      position: absolute;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--pink);
      transform: translateX(-50%);
      white-space: nowrap;
      pointer-events: none;
    }

    /* ─── FUTURE DIVIDER ────────────────────── */
    .future-line {
      position: absolute;
      width: 1px;
      border-left: 1.5px dashed var(--muted);
      pointer-events: none;
    }

    .future-tag {
      position: absolute;
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      transform: translateX(-50%);
      white-space: nowrap;
      pointer-events: none;
    }

    /* ─── TRACK LABELS (fixed left) ─────────── */
    .track-label-fixed {
      position: fixed;
      left: 10px;
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 100;
    }

    /* ─── ITEMS ─────────────────────────────── */
    .tl-item {
      position: absolute;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      z-index: 10;
    }

    .tl-item:hover { z-index: 100 !important; }

    .tl-card {
      background: #FDFBF6;
      border: 1px solid var(--border);
      border-top-width: 2px;
      padding: 7px 9px;
      min-height: 52px;
      transition: box-shadow 0.15s;
    }

    .tl-item:hover .tl-card {
      box-shadow: 0 3px 16px rgba(0,0,0,0.10);
    }

    .tl-item.future .tl-card {
      background: var(--bg2);
      border-style: dashed;
      border-top-style: dashed;
    }

    .card-cat {
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .card-title {
      font-size: 0.68rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 2px;
    }

    .card-desc {
      font-size: 0.58rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .tl-conn {
      width: 1px;
      background: var(--border);
      margin: 0 auto;
      flex-shrink: 0;
    }

    .tl-item.future .tl-conn {
      background: transparent;
      border-left: 1px dashed var(--muted);
      width: 0;
    }

    .tl-dot {
      width: 7px;
      height: 7px;
      margin: 0 auto;
      flex-shrink: 0;
      transition: transform 0.15s;
    }

    .tl-item:hover .tl-dot {
      transform: scale(1.5);
    }

    /* ─── TOOLTIP ───────────────────────────── */
    #tooltip {
      position: fixed;
      background: #FDFBF6;
      border: 1px solid var(--border);
      padding: 14px 16px;
      max-width: 280px;
      z-index: 500;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      box-shadow: 0 8px 32px rgba(0,0,0,0.09);
    }

    #tooltip.show { opacity: 1; }

    .tt-yr {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .tt-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .tt-body {
      font-size: 0.7rem;
      color: var(--muted);
      line-height: 1.65;
    }

    /* ─── MINIMAP ───────────────────────────── */
    #minimap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--minimap-h);
      background: var(--bg);
      border-top: 1px solid var(--border);
      cursor: pointer;
      overflow: hidden;
    }

    #minimapCanvas {
      position: absolute;
      top: 0; left: 0;
    }

    #minimapVp {
      position: absolute;
      top: 0; bottom: 0;
      background: rgba(26,26,24,0.05);
      border-left: 1px solid rgba(26,26,24,0.18);
      border-right: 1px solid rgba(26,26,24,0.18);
      pointer-events: none;
    }

    /* ─── HEADER WEBSITE LINK ───────────────── */
    .h-website {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: color 0.15s;
    }
    .h-website:hover { color: var(--fg); border-bottom-color: var(--fg); }

    /* ─── DRAG HINT ─────────────────────────── */
    #hint {
      position: fixed;
      bottom: calc(var(--minimap-h) + 16px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      pointer-events: none;
      transition: opacity 0.4s;
      z-index: 100;
    }

    /* ─── TOOLTIP CLAMP ──────────────────────── */
    #tooltip {
      max-width: min(280px, calc(100vw - 24px));
    }

    /* ─── MOBILE ─────────────────────────────── */
    @media (max-width: 640px) {
      :root { --header-h: 90px; }

      header {
        flex-wrap: wrap;
        height: auto;
        min-height: var(--header-h);
        padding: 10px 14px 8px;
        gap: 6px;
        align-items: center;
      }
      .h-sub { display: none; }
      .h-left { flex-shrink: 0; }
      .h-right { margin-left: auto; }
      .legend {
        order: 3;
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        flex-wrap: nowrap;
        gap: 10px;
        padding-bottom: 2px;
        scrollbar-width: none;
      }
      .legend::-webkit-scrollbar { display: none; }
      .l-item { flex-shrink: 0; font-size: 0.58rem; }
      .track-label-fixed { display: none; }
      .tt-close { display: block !important; }
    }

    @media (max-width: 400px) {
      :root { --header-h: 90px; }
      .h-website { display: none; }
      .now-btn { font-size: 0.55rem; padding: 3px 9px; }
    }
  </style>
</head>
<body>

<header>
  <div class="h-left">
    <div class="h-name">Bin Youn — Trajectory</div>
    <div class="h-sub">Practice-Based Research · Computational Cosmotechnics of Perception · RMIT University Vietnam</div>
  </div>
  <div class="legend" id="trackFilters">
    <button class="l-item" data-track="education" onclick="toggleTrack('education')"><div class="l-dot" style="background:var(--c-education)"></div>Education</button>
    <button class="l-item" data-track="artwork"   onclick="toggleTrack('artwork')"  ><div class="l-dot" style="background:var(--c-artwork)"  ></div>Practice</button>
    <button class="l-item" data-track="exhibition"onclick="toggleTrack('exhibition')"><div class="l-dot" style="background:var(--c-exhibition)"></div>Exhibition</button>
    <button class="l-item" data-track="research"  onclick="toggleTrack('research')" ><div class="l-dot" style="background:var(--c-research)" ></div>Research</button>
    <button class="l-item" data-track="career"    onclick="toggleTrack('career')"   ><div class="l-dot" style="background:var(--c-career)"   ></div>Career</button>
  </div>
  <div class="h-right" style="display:flex;gap:12px;align-items:center;">
    <button class="now-btn" onclick="scrollToNow()">● Now</button>
    <a href="https://binyoun.com" target="_blank" class="h-website">binyoun.com ↗</a>
  </div>
</header>

<div id="tlContainer">
  <div id="tlTrack"></div>
</div>

<div id="tooltip">
  <span class="tt-close" id="ttClose">✕</span>
  <div class="tt-yr" id="ttYr"></div>
  <div class="tt-title" id="ttTitle"></div>
  <div class="tt-body" id="ttBody"></div>
  <div id="ttLink" style="margin-top:8px; font-size:0.58rem; letter-spacing:0.08em; color:#FF2D9B; opacity:0.8;"></div>
</div>

<div id="minimap">
  <canvas id="minimapCanvas"></canvas>
  <div id="minimapVp"></div>
</div>

<div id="hint">← drag or scroll to navigate →</div>

<script>
/* ═══════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════ */
const C = {
  pxPerYear: 265,
  startYear: 2008.5,

const PHASES = [
  { id:'foundation', label:'Foundation',    s:2009, e:2018, color:'#E8E3D8' },

/* offsets = distance from axis to the FAR edge of the card+connector
   side: 'above' → card grows upward from axis
         'below' → card grows downward from axis               */
const TRACKS = {
  education:  { side:'above', offset:270, color:'#1A56DB', label:'Education'        },
  artwork:    { side:'above', offset:155, color:'#B45309', label:'Practice'          },
  exhibition: { side:'above', offset: 58, color:'#92400E', label:'Exhibition / Award'},

const CARD_H = 54;

/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */
const EVENTS = [
  /* ── EDUCATION ─────────────────────────── */
  { year:2009.1,  track:'education', xo:-25, title:'DFLHS 23rd',
    desc:'French / Japanese · Seoul, 2009',
    detail:'Daewon Foreign Language High School (DFLHS), 23rd graduating class, Seoul, South Korea, February 2009. Major: French / Minor: Japanese. Multilingual foundation — Korean, French, Japanese. Early cross-cultural and language immersion that shapes the transnational research identity: Korea → France → US → Vietnam.' },
  { year:2015.17, track:'education', xo:25,  title:'HI Media Academy',
    desc:'Graphic Design · Seoul, 2015',
    detail:'HI Media Computer Academy, Seoul, South Korea, February–May 2015. Completed Computer Graphic Design program. First formal training in digital design and visual production — precursor to the visual and computational practice that develops through MFA and beyond.' },
  { year:2017.42, track:'education', xo:-25, title:'Vision Photography',
    desc:'8 courses · Seoul, Mar–Dec 2017',
    detail:'Vision Photography Academy, Seoul, South Korea, March–December 2017. Completed 4 Basic + 2 Intermediate + 2 Advanced Photography courses. Attended lectures by contemporary Korean artists as extracurricular activities. Foundational photography training — and first solo exhibition (Be@IT) was held in the same institution\'s gallery, October 2017: student and exhibitor in the same year.' },
  { year:2011.8, track:'education', title:'Exchange — Paris',
    desc:'Paris Graduate School of Management',
    detail:'Exchange semester, Fall 2011. Paris Graduate School of Management, Paris, France. Accepted into the exchange student program from Sungkyunkwan University. Experienced a wide range of cultural events, international museums, galleries, and art fairs across Paris. Resided with a host family and communicated in French on a daily basis — building language fluency and cultural immersion. First sustained international experience outside Korea. Seeds of cross-cultural sensitivity, relational thinking, and aesthetic awareness that run through the research practice today: Korea → France → US → Vietnam.' },
  { year:2013.1, track:'education', title:'B.A. / B.B.A.',
    desc:'Sungkyunkwan University · GPA 3.94',
    detail:'Double degree: B.A. Consumer & Family Sciences + B.B.A. Business Administration. GPA 3.94/4.50 · Dean\'s List. Top Performer Award: Language, Volunteering, IT (Feb 2013). Background in consumer behavior and systems thinking — early foundation for human perception research.' },
  { year:2018.3, track:'education', title:'MFA — begins',
    desc:'CSULB · Studio Arts, Photography',
    detail:'Enrolled M.F.A. Studio Arts with Photography emphasis, California State University Long Beach. Practice expands from lens-based to spatial installation.' },
  { year:2023.4, track:'education', title:'MFA — Graduated',
    desc:'Distinguished Achievement in Creative Activity',
    detail:'M.F.A. Studio Arts, Photography · California State University Long Beach, May 2023. Awarded Distinguished Achievement in Creative Activity. Practice trajectory fully established: Photography → Installation → XR → AI.' },
  { year:2025.3, track:'education', title:'GCTLT — begins',
    desc:'RMIT University · 2025–Oct 2026',
    detail:'Graduate Certificate in Tertiary Learning & Teaching (GCTLT) — professional qualification in higher education pedagogy at RMIT University. Started 2025, completing October 2026. Strengthens research identity as educator-researcher and supports PhD candidature application.' },
  { year:2026.79, track:'education', title:'GCTLT — Completed',
    desc:'Certificate · Oct 2026',
    detail:'Graduate Certificate in Tertiary Learning & Teaching (GCTLT) — completed October 2026, RMIT University. Professional qualification in higher education pedagogy. Key credential supporting PhD candidature and long-term academic career pathway.' },
  { year:2027.79, track:'education', title:'PhD Candidature',
    desc:'RMIT Vietnam · Oct 2027',
    detail:'PhD research begins. Supervisor team TBD — main: Media/Creative Practice; co: Computing/HCI. Working title: Cosmotechnics of Perception. Format: 3–5 major installations + written exegesis. Balance: 40% theory / 60% practice.',
    future:true },

  /* ── PRACTICE / ARTWORKS ────────────────── */
  { year:2017.55, track:'artwork', xo:-35, title:'Be@IT',
    desc:'Solo · Vision Photography Academy, Seoul',
    detail:'First solo exhibition. Personal relationship with traditional Korean rice cake. Lens-based practice begins with cultural-material inquiry. Vision Photography Academy Hall, Seoul, Oct 2017.' },
  { year:2017.7,  track:'artwork', xo:35,  title:'Memories of Seoul',
    desc:'Collaborative photography · Seoul',
    detail:'Co-produced artwork with travelers — collecting and connecting memories of places in Seoul. Participatory co-creation emerges early. Hanchae Restaurant Gallery, Sep 2017.' },
  { year:2021.85, track:'artwork', xo:-25, title:'W(AV)E · LiSTeN',
    desc:'Solo · Shakarian SSC Gallery, CSULB',
    detail:'Photography expands into spatial installation. Two solo exhibitions at Shakarian Student Success Center Gallery, CSULB, Dec 2021. The lens-based becomes environment-based.' },
  { year:2021.85, track:'artwork', xo:25,  title:'Natura Naturata',
    desc:'Solo · Max L. Getov West Gallery',
    detail:'Solo exhibition, Max L. Getov West Gallery, CSULB, Oct 2021. Super-F-icial S: Shakarian SSC Gallery, Nov 2021. Practice grounded in material and ecological sensitivity.' },
  { year:2022.1,  track:'artwork', xo:-30, title:'Somatic Blinds',
    desc:'Solo · Werby Gallery · Feb 2022',
    detail:'Grow light, vinyl blind, plywood, aircraft wire, Mylar thermal blanket, bird reflective scare tape. "As soon as the vessel became full of floating gas, I turned back." Ecological sensitivity in material choices.' },
  { year:2022.75, track:'artwork', xo:25,  title:'ㅁotherisland',
    desc:'Solo · 5-channel video installation',
    detail:'5-channel video installation with projectors. Island as threshold — mother/land/other. "Entering this time-space, beholders navigate their own landscapes." One of the defining early installations. Shown again at iNVENTX MMU 2025.' },
  { year:2022.2,  track:'artwork', xo:-20, title:'YOUR LEAVES',
    desc:'Solo · Shakarian SSC Gallery',
    detail:'YOUR LEAVES TOUCH MY PLANES — Solo, Shakarian Student Success Center Gallery, Nov 2022. Abyss (w/ Josh Zubkoff): kaleidoscope, mirrors, projectors, Gelora photographs. Open your Window: 4-channel video, aircraft wires, vinyl blinds.' },
  { year:2023.25, track:'artwork', xo:-28, title:'Breathscape',
    desc:'Solo · Motors, PETG, dichroic film',
    detail:'Two human-sized spherical light sculptures — Undulating: Inhale and Exhale — suspended from ceiling, revolving at 1 RPM. Dichroic film transforms PETG into multi-color reflections. Bodily projection. Shakarian SSC Gallery, Apr 2023.' },
  { year:2023.25, track:'artwork', xo:28,  title:'Projective Verse of ㅇ',
    desc:'Solo · Max L. Getov East & West',
    detail:'ㅇ is a sound of water. Inspired by motorcycle trip across Korea — landscape, mountains, oceans, wind. "Landscapes can awaken people to who they are." Photography → landscape → perception environment. Mar 2023.' },
  { year:2023.7,  track:'artwork', title:'Gelora XR Hub',
    desc:'XR platform · gelora-xr.xyz',
    detail:'Ongoing XR practice platform. AR installations, web-based immersive environments, physical-digital hybrid performances. Transforms organic matter (fallen flowers, trees) into hybrid digital creatures through East Asian cosmology. geloracompass, gelora-bagua, gelora-my branches.',
    link:'https://gelora-xr.xyz' },
  { year:2025.85, track:'artwork', xo:-25, title:'Sacred Tree',
    desc:'XR · HOZO City Tết Fest, HCMC',
    detail:'Participatory XR ritual environment — Summoning Gelora. Spatial audio, body scan, East Asian cosmology. HOZO City Tết Festival, Dec 2025 (CTRL+M Immersive House, HCMC). Clouds Upon The Tree: Vin Gallery, May 2026. ISEA2026 Dubai.' },
  { year:2026.1,  track:'artwork', xo:25,  title:'Øryn / 륜',
    desc:'AI media entity · ongoing',
    detail:'AI-assisted media entity and relational archive being. East Asian cosmology + posthuman presence. AI as relational medium — not tool, not spectacle. The most advanced articulation of the research to date.' },
  { year:2027.6,  track:'artwork', xo:-28, title:'PhD Install. 1',
    desc:'Perception Architecture',
    detail:'RQ: Does modular vs. integrated perception architecture produce different emotional experience in interactive environments?\n\nDesign: Room A (Toegye — modular): each sensor controls a separate light zone independently. Room B (Yulgok — unified): all sensors affect the whole environment as one integrated system.\n\nDeliverable: Installation + documented audience response data + conference paper. Target venue: ISEA or ACM SIGGRAPH Art Gallery.',
    future:true },
  { year:2028.7,  track:'artwork', xo:0,   title:'PhD Install. 2',
    desc:'Hydro-Cultural Memory System',
    detail:'RQ: How can computational media practice the care and repair of erased ecological and cultural systems?\n\nDesign: HCMC / Mekong delta context. Sensors detect humidity, water level, environmental data. AI reconstructs erased canal histories and disappearing names through responsive light + XR. Connects to Futures of Listening water practice.\n\nDeliverable: Site-specific installation (HCMC context) + journal article submission.',
    future:true },

/* ═══════════════════════════════════════════
   OVERLAP STATE (module-level for minimap access)
═══════════════════════════════════════════ */
let _resolvedCx   = new Map();
const hiddenTracks = new Set();
let tooltipPinned  = false;
let _mdX = 0, _mdY = 0;

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
const tlContainer = document.getElementById('tlContainer');
const tlTrack     = document.getElementById('tlTrack');
const tooltip     = document.getElementById('tooltip');
const ttYr        = document.getElementById('ttYr');
const ttTitle     = document.getElementById('ttTitle');
const ttBody      = document.getElementById('ttBody');
const minimapEl     = document.getElementById('minimap');
const minimapCanvas = document.getElementById('minimapCanvas');
const minimapVp     = document.getElementById('minimapVp');
const ttLink        = document.getElementById('ttLink');

function yearToX(yr) {
  return C.padLeft + (yr - C.startYear) * C.pxPerYear;
}

function totalWidth() {
  return C.padLeft + (C.endYear - C.startYear) * C.pxPerYear + C.padRight;
}

function containerH() {
  return tlContainer.getBoundingClientRect().height;
}

function axisY() {
  const CH = containerH();
  // Compute ideal axis position proportional to actual track extents
  const aboveTracks = Object.values(TRACKS).filter(t => t.side === 'above');
  const belowTracks = Object.values(TRACKS).filter(t => t.side === 'below');
  const maxAbove = Math.max(...aboveTracks.map(t => t.offset));          // 270
  const maxBelow = Math.max(...belowTracks.map(t => t.offset)) + CARD_H; // 185+54=239
  const ideal = CH * (maxAbove / (maxAbove + maxBelow));
  // Clamp: never let education get cut by header, never let career overflow into minimap
  return Math.max(maxAbove + 14, Math.min(CH - maxBelow - 14, ideal));
}

function headerH() {
  return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--header-h'));
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function render() {
  tlTrack.innerHTML = '';
  const TW  = totalWidth();
  const CH  = containerH();
  const AY  = axisY();
  const HH  = headerH() || 58;

  tlTrack.style.width  = TW + 'px';
  tlTrack.style.height = CH + 'px';

  // ── Phase bands
  PHASES.forEach(p => {
    const x1 = yearToX(p.s), x2 = yearToX(p.e);
    const band = el('div', 'phase-band', {
      left: x1 + 'px', width: (x2 - x1) + 'px',
      background: p.color, opacity: '0.6',
    });
    tlTrack.appendChild(band);

    const lbl = el('div', 'phase-label', {
      left: (x1 + 10) + 'px', top: (AY + 18) + 'px',
    });
    lbl.textContent = p.label;
    tlTrack.appendChild(lbl);
  });

  // ── Axis
  const axis = el('div', 'axis-line', {
    top: AY + 'px', width: TW + 'px',
  });
  tlTrack.appendChild(axis);

  // ── Year ticks
  for (let y = Math.ceil(C.startYear); y <= C.endYear; y++) {
    const isMajor = y % 5 === 0;
    const tick = el('div', 'year-tick' + (isMajor ? ' major' : ''), {
      left: yearToX(y) + 'px', top: AY + 'px',
    });
    const mark = el('div', 'tick-mark', { height: (isMajor ? 10 : 5) + 'px' });
    const lbl  = el('div', 'tick-year');
    lbl.textContent = y;
    tick.appendChild(mark);
    tick.appendChild(lbl);
    tlTrack.appendChild(tick);
  }

  // ── NOW marker (March 2026 ≈ 2026.22)
  const nowX = yearToX(2026.22);
  const nowLine = el('div', 'now-line', {
    left: nowX + 'px', top: (AY - 44) + 'px', height: '88px',
  });
  tlTrack.appendChild(nowLine);
  const nowTag = el('div', 'now-tag', {
    left: nowX + 'px', top: (AY - 60) + 'px',
  });
  nowTag.textContent = 'Now';
  tlTrack.appendChild(nowTag);

  // ── Future divider (2027)
  const futureX = yearToX(2027);
  const futLine = el('div', 'future-line', {
    left: futureX + 'px', top: '0', height: CH + 'px',
  });
  tlTrack.appendChild(futLine);
  const futTag = el('div', 'future-tag', {
    left: futureX + 'px', top: '12px',
  });
  futTag.textContent = 'Future →';
  tlTrack.appendChild(futTag);

  // ── Resolve per-track overlaps (prevent card collisions)
  const CARD_W = 124, OVERLAP_PAD = 10;
  const _byTrack = {};
  EVENTS.forEach(ev => {
    if (hiddenTracks.has(ev.track)) return;
    if (!_byTrack[ev.track]) _byTrack[ev.track] = [];
    _byTrack[ev.track].push({ ev, cx: yearToX(ev.year) + (ev.xo || 0) });
  });
  Object.values(_byTrack).forEach(list => {
    list.sort((a, b) => a.cx - b.cx);
    for (let pass = 0; pass < 60; pass++) {
      let moved = false;
      for (let k = 0; k < list.length - 1; k++) {
        const need = CARD_W + OVERLAP_PAD;
        const gap  = list[k+1].cx - list[k].cx;
        if (gap < need) {
          const half = (need - gap) / 2;
          list[k].cx   -= half;
          list[k+1].cx += half;
          moved = true;
        }
      }
      if (!moved) break;
    }
  });
  _resolvedCx = new Map();
  Object.values(_byTrack).forEach(list => list.forEach(({ev, cx}) => _resolvedCx.set(ev, cx)));

  // ── Items
  EVENTS.forEach(ev => {
    if (hiddenTracks.has(ev.track)) return;
    const td    = TRACKS[ev.track];
    const isAbo = td.side === 'above';
    const xBase = _resolvedCx.get(ev);
    const isFut = !!ev.future;
    const W     = CARD_W;
    const connH = Math.max(8, td.offset - CARD_H);

    const trackZ = { exhibition:15, research:14, artwork:10, career:8, education:6 };
    const item = el('div', 'tl-item' + (isFut ? ' future' : ''), {
      left:   (xBase - W / 2) + 'px',
      top:    (isAbo ? AY - td.offset : AY) + 'px',
      width:  W + 'px',
      height: td.offset + 'px',
      zIndex: String(trackZ[ev.track] || 10),
    });

    const catLabel = {
      education:'Education', artwork:'Practice',
      exhibition:'Exhibition', research:'Research', career:'Career'
    }[ev.track] || ev.track;

    const linkBadge = ev.link ? `<span style="float:right;font-size:0.5rem;opacity:0.6;">↗</span>` : '';
    const cardHtml = `
      <div class="tl-card" style="border-top-color:${td.color}; height:${CARD_H}px; overflow:hidden; cursor:${ev.link ? 'pointer' : 'default'};">
        <div class="card-cat" style="color:${td.color}">${catLabel}${linkBadge}</div>
        <div class="card-title">${ev.title}</div>
        <div class="card-desc">${ev.desc}</div>
      </div>`;

    const connHtml = `<div class="tl-conn" style="height:${connH}px;${isFut?' background:transparent; border-left:1px dashed rgba(26,26,24,0.2); width:0;':''}"></div>`;

    const dotColor = isFut ? '#C8C3BB' : td.color;
    const dotHtml  = `<div class="tl-dot" style="background:${dotColor}; border: 1.5px solid ${td.color};"></div>`;

    item.innerHTML = isAbo
      ? cardHtml + connHtml + dotHtml
      : dotHtml + connHtml + cardHtml;

    // Tooltip
    const _showTip = (e) => {
      const yr = Math.floor(ev.year);
      ttYr.textContent    = isFut ? `${yr} — Planned` : String(yr);
      ttTitle.textContent = ev.title;
      ttTitle.style.color = td.color;
      ttBody.textContent  = ev.detail || ev.desc;
      ttLink.textContent  = ev.link ? '↗ click to open' : '';
      tooltip.classList.add('show');
      placeTooltip(e);
    };
    item.addEventListener('mouseenter', e => { if (!tooltipPinned) _showTip(e); });
    item.addEventListener('mousemove',  e => { if (!tooltipPinned) placeTooltip(e); });
    item.addEventListener('mouseleave', () => { if (!tooltipPinned) tooltip.classList.remove('show'); });

    // Click: open link OR pin/unpin tooltip
    item.addEventListener('mousedown',  e => { _mdX = e.clientX; _mdY = e.clientY; });
    item.addEventListener('touchstart', e => { _mdX = e.touches[0].clientX; _mdY = e.touches[0].clientY; }, { passive: true });
    item.addEventListener('click', e => {
      if (Math.hypot(e.clientX - _mdX, e.clientY - _mdY) >= 6) return;
      if (ev.link) { window.open(ev.link, '_blank'); return; }
      tooltipPinned = !tooltipPinned;
      tooltip.classList.toggle('pinned', tooltipPinned);
      if (tooltipPinned) { _showTip(e); } else { tooltip.classList.remove('show'); }
    });

    tlTrack.appendChild(item);
  });

  // ── Fixed track labels
  document.querySelectorAll('.track-label-fixed').forEach(n => n.remove());
  Object.entries(TRACKS).forEach(([key, td]) => {
    if (hiddenTracks.has(key)) return;
    const isAbo = td.side === 'above';
    const absY  = HH + (isAbo ? AY - td.offset + 6 : AY + td.offset - CARD_H + 6);
    const lbl   = document.createElement('div');
    lbl.className = 'track-label-fixed';
    lbl.textContent = td.label;
    lbl.style.top   = absY + 'px';
    lbl.style.color = td.color + '88';
    document.body.appendChild(lbl);
  });

  updateMinimap();
}

function el(tag, cls, styles) {
  const d = document.createElement(tag);
  if (cls) d.className = cls;
  if (styles) Object.assign(d.style, styles);
  return d;
}

function placeTooltip(e) {
  const src = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
  const cx = src.clientX, cy = src.clientY;
  const TW = Math.min(280, window.innerWidth - 24);
  const TH = tooltip.offsetHeight || 220;
  const mmH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--minimap-h')) || 82;
  const vw = window.innerWidth, vh = window.innerHeight;
  let x = cx + 18, y = cy + 18;
  if (x + TW > vw - 8)       x = cx - TW - 18;
  if (y + TH > vh - mmH - 8) y = cy - TH - 18;
  tooltip.style.left = Math.max(8, Math.min(x, vw - TW - 8)) + 'px';
  tooltip.style.top  = Math.max(8, Math.min(y, vh - mmH - TH - 8)) + 'px';
}

/* ═══════════════════════════════════════════
   SCROLL + MOMENTUM
═══════════════════════════════════════════ */
let scrollX = 0, isDrag = false, dragX0 = 0, dragS0 = 0;
let _velX = 0, _lastMX = 0, _lastMT = 0, _rafId = null;

function setScroll(x) {
  const max = totalWidth() - window.innerWidth;
  scrollX = Math.max(0, Math.min(x, max));
  tlTrack.style.transform = `translateX(${-scrollX}px)`;
  updateMinimap();
}

function _smoothScrollTo(target, dur) {
  cancelAnimationFrame(_rafId);
  const duration = dur || 600;
  const start = scrollX, dist = target - start, t0 = performance.now();
  function tick(now) {
    const p = Math.min((now - t0) / duration, 1);
    const ease = p < 0.5 ? 2*p*p : -1 + (4 - 2*p) * p;
    setScroll(start + dist * ease);
    if (p < 1) _rafId = requestAnimationFrame(tick);
  }
  _rafId = requestAnimationFrame(tick);
}

function _startMomentum(v) {
  cancelAnimationFrame(_rafId);
  (function tick() {
    v *= 0.93;
    if (Math.abs(v) < 0.4) return;
    setScroll(scrollX + v);
    _rafId = requestAnimationFrame(tick);
  })();
}

function scrollToNow() {
  _smoothScrollTo(yearToX(2026.22) - window.innerWidth / 2);
}

tlContainer.addEventListener('mousedown', e => {
  cancelAnimationFrame(_rafId);
  isDrag = true; dragX0 = e.clientX; dragS0 = scrollX;
  _lastMX = e.clientX; _lastMT = performance.now(); _velX = 0;
  tlContainer.classList.add('dragging');
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!isDrag) return;
  const now = performance.now(), dt = now - _lastMT;
  if (dt > 0) _velX = (e.clientX - _lastMX) / dt;
  _lastMX = e.clientX; _lastMT = now;
  setScroll(dragS0 - (e.clientX - dragX0));
});
document.addEventListener('mouseup', () => {
  if (!isDrag) return;
  isDrag = false;
  tlContainer.classList.remove('dragging');
  if (Math.abs(_velX) > 0.1) _startMomentum(-_velX * 16);
});

tlContainer.addEventListener('wheel', e => {
  e.preventDefault();
  cancelAnimationFrame(_rafId);
  setScroll(scrollX + e.deltaY * 1.8 + e.deltaX * 1.8);
}, { passive: false });

let tx0 = 0, ts0 = 0, _tvx = 0, _tlt = 0;
tlContainer.addEventListener('touchstart', e => {
  cancelAnimationFrame(_rafId);
  tx0 = e.touches[0].clientX; ts0 = scrollX; _tvx = 0; _tlt = performance.now();
});
tlContainer.addEventListener('touchmove', e => {
  const now = performance.now(), dt = now - _tlt;
  if (dt > 0) _tvx = (e.touches[0].clientX - tx0) / dt;
  setScroll(ts0 - (e.touches[0].clientX - tx0));
  e.preventDefault();
}, { passive: false });
tlContainer.addEventListener('touchend', () => {
  if (Math.abs(_tvx) > 0.1) _startMomentum(-_tvx * 16);
});

/* ═══════════════════════════════════════════
   MINIMAP
═══════════════════════════════════════════ */
function updateMinimap() {
  const TW    = totalWidth();
  const mW    = minimapEl.offsetWidth;
  const scale = mW / TW;
  const vpW   = window.innerWidth * scale;
  const vpL   = scrollX * scale;
  minimapVp.style.left  = vpL + 'px';
  minimapVp.style.width = vpW + 'px';
  drawMinimap(TW, scale);
}

function drawMinimap(TW, scale) {
  const canvas = minimapCanvas;
  const W = minimapEl.offsetWidth;
  const H = minimapEl.offsetHeight;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const ay  = H * 0.5;

  ctx.clearRect(0, 0, W, H);

  PHASES.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.fillRect(yearToX(p.s) * scale, 0, (yearToX(p.e) - yearToX(p.s)) * scale, H);
  });

  ctx.strokeStyle = 'rgba(26,26,24,0.18)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, ay); ctx.lineTo(W, ay); ctx.stroke();

  // Year marks
  for (let y = Math.ceil(C.startYear); y <= C.endYear; y += 5) {
    const x = yearToX(y) * scale;
    ctx.strokeStyle = 'rgba(26,26,24,0.15)'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(x, ay - 4); ctx.lineTo(x, ay + 4); ctx.stroke();
  }

  EVENTS.forEach(ev => {
    const td  = TRACKS[ev.track];
    const x   = (_resolvedCx.get(ev) ?? (yearToX(ev.year) + (ev.xo || 0))) * scale;
    const off = ev.future ? 4 : 5;
    const y   = td.side === 'above' ? ay - off : ay + off;
    ctx.fillStyle = ev.future ? '#C8C3BB' : td.color;
    ctx.fillRect(x - 2, y - 2, 4, 4);
  });

  // NOW
  const nowX = yearToX(2026.22) * scale;
  ctx.strokeStyle = '#FF2D9B'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(nowX, 0); ctx.lineTo(nowX, H); ctx.stroke();

  // Future
  const futX = yearToX(2027) * scale;
  ctx.strokeStyle = 'rgba(26,26,24,0.25)'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
  ctx.beginPath(); ctx.moveTo(futX, 0); ctx.lineTo(futX, H); ctx.stroke();
  ctx.setLineDash([]);
}

minimapEl.addEventListener('click', e => {
  const r = minimapEl.getBoundingClientRect();
  const scale = minimapEl.offsetWidth / totalWidth();
  _smoothScrollTo((e.clientX - r.left) / scale - window.innerWidth / 2);
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
function init() {
  render();
  // Start scroll showing 2016 (just before MFA + practice begins)
  setScroll(yearToX(2015.5) - 80);

  // Fade hint after 3s
  setTimeout(() => {
    const hint = document.getElementById('hint');
    if (hint) hint.style.opacity = '0';
  }, 3000);
}

init();
window.addEventListener('resize', () => { render(); });

/* ═══════════════════════════════════════════
   TRACK FILTERS
═══════════════════════════════════════════ */
function toggleTrack(track) {
  if (hiddenTracks.has(track)) hiddenTracks.delete(track);
  else hiddenTracks.add(track);
  document.querySelectorAll('.l-item').forEach(btn => {
    btn.classList.toggle('hidden-track', hiddenTracks.has(btn.dataset.track));
  });
  render();
}

/* ═══════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════ */
const _trackOrder = ['education','artwork','exhibition','research','career'];
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft')  { e.preventDefault(); _smoothScrollTo(scrollX - 420, 320); }
  if (e.key === 'ArrowRight') { e.preventDefault(); _smoothScrollTo(scrollX + 420, 320); }
  if (e.key === 'n' || e.key === 'N') scrollToNow();
  const idx = parseInt(e.key) - 1;
  if (idx >= 0 && idx <= 4) toggleTrack(_trackOrder[idx]);
});

/* ═══════════════════════════════════════════
   TOOLTIP PIN
═══════════════════════════════════════════ */
document.getElementById('ttClose').addEventListener('click', () => {
  tooltipPinned = false;
  tooltip.classList.remove('pinned', 'show');
});
document.addEventListener('click', e => {
  if (!tooltipPinned) return;
  if (tooltip.contains(e.target) || e.target.closest('.tl-item')) return;
  tooltipPinned = false;
  tooltip.classList.remove('pinned', 'show');
});
</script>
